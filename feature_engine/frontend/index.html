<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dynamic Feature Engine Visualizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/dist/vis-network.min.css" />
  <style>
    :root {
      --bg: #f5efe5;
      --panel: #fffdf8;
      --line: #dfd5c3;
      --ink: #202125;
      --muted: #67656c;
      --accent: #dd623c;
      --ok: #148f5c;
      --warn: #e7c547;
      --fail: #d84f4f;
      --raw: #f2b263;
      --derived: #69a8dc;
      --shadow: 0 10px 30px rgba(50, 39, 20, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 0% 0%, #ffe0c7 0%, transparent 35%),
        radial-gradient(circle at 100% 0%, #f9f1c8 0%, transparent 35%),
        var(--bg);
      padding: 20px;
    }

    .shell { max-width: 1680px; margin: 0 auto; }

    h1 { margin: 0 0 6px; font-size: clamp(1.7rem, 2.8vw, 2.5rem); }
    .sub { margin: 0 0 16px; color: var(--muted); }

    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 16px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      box-shadow: var(--shadow);
    }

    h2 {
      margin: 0 0 10px;
      font-size: 1rem;
    }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .field { display: grid; gap: 4px; }

    label {
      font-size: 0.82rem;
      color: #3d3c42;
      font-weight: 500;
    }

    input, select {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 8px;
      width: 100%;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.82rem;
    }

    .checks {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px;
      background: #fff;
      font-size: 0.85rem;
    }

    .actions { margin-top: 12px; display: flex; gap: 8px; }

    button {
      border: 0;
      border-radius: 999px;
      padding: 9px 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }

    .primary { background: var(--accent); color: #fff; }
    .secondary { background: #fff; color: var(--ink); border: 1px solid var(--line); }

    #waveStatus {
      margin: 8px 0 0;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.84rem;
      color: #3e3d44;
    }

    #network {
      height: 620px;
      border: 1px dashed var(--line);
      border-radius: 12px;
      background: #fff;
    }

    .bottom {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 14px;
    }

    pre {
      margin: 0;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.79rem;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 340px;
      overflow: auto;
    }

    .metric {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.82rem;
      margin: 4px 0;
    }

    .ok { color: var(--ok); }
    .fail { color: var(--fail); }

    @media (max-width: 1120px) {
      .layout { grid-template-columns: 1fr; }
      .bottom { grid-template-columns: 1fr; }
      #network { height: 520px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <h1>Dynamic Feature Execution Engine</h1>
    <p class="sub">Live wave animation, model outputs, partial failures, and timing comparison.</p>

    <div class="layout">
      <section class="panel">
        <h2>Inputs + Models</h2>
        <div class="field-grid">
          <div class="field"><label for="user_age">user_age</label><input id="user_age" type="number" value="29" /></div>
          <div class="field"><label for="product_price">product_price</label><input id="product_price" type="number" step="0.01" value="1200" /></div>
          <div class="field"><label for="transaction_history">transaction_history</label><input id="transaction_history" value="150,220,180,210,160,300" /></div>
          <div class="field"><label for="device_fingerprint">device_fingerprint</label><input id="device_fingerprint" value="abc123xyz" /></div>

          <div class="field"><label for="distance_from_home">distance_from_home</label><input id="distance_from_home" type="number" step="0.1" value="12.5" /></div>
          <div class="field"><label for="previous_fraud_attempts">previous_fraud_attempts</label><input id="previous_fraud_attempts" type="number" value="0" /></div>
          <div class="field"><label for="is_night_transaction">is_night_transaction</label><input id="is_night_transaction" type="number" value="0" min="0" max="1" /></div>
          <div class="field"><label for="card_present">card_present</label><input id="card_present" type="number" value="1" min="0" max="1" /></div>
          <div class="field"><label for="international_transaction">international_transaction</label><input id="international_transaction" type="number" value="0" min="0" max="1" /></div>

          <div class="field"><label for="tenure_months">tenure_months</label><input id="tenure_months" type="number" value="18" /></div>
          <div class="field"><label for="last_purchase_days">last_purchase_days</label><input id="last_purchase_days" type="number" value="21" /></div>
          <div class="field"><label for="support_tickets">support_tickets</label><input id="support_tickets" type="number" value="1" /></div>
          <div class="field"><label for="complaints">complaints</label><input id="complaints" type="number" value="0" /></div>
          <div class="field"><label for="discount_used">discount_used</label><input id="discount_used" type="number" value="1" min="0" max="1" /></div>
          <div class="field"><label for="email_open_rate">email_open_rate</label><input id="email_open_rate" type="number" step="0.01" value="0.42" /></div>
          <div class="field"><label for="app_visits_per_week">app_visits_per_week</label><input id="app_visits_per_week" type="number" value="6" /></div>
          <div class="field"><label for="payment_delays">payment_delays</label><input id="payment_delays" type="number" value="0" /></div>

          <div class="field"><label for="competitor_price">competitor_price</label><input id="competitor_price" type="number" step="0.01" value="1150" /></div>
          <div class="field"><label for="inventory_level">inventory_level</label><input id="inventory_level" type="number" value="140" /></div>
          <div class="field"><label for="customer_rating">customer_rating</label><input id="customer_rating" type="number" step="0.1" value="4.3" /></div>
          <div class="field"><label for="seasonal_factor">seasonal_factor</label><input id="seasonal_factor" type="number" step="0.01" value="1.05" /></div>

          <div class="field"><label for="avg_rating_given">avg_rating_given</label><input id="avg_rating_given" type="number" step="0.1" value="4.0" /></div>
          <div class="field"><label for="browsing_time_min">browsing_time_min</label><input id="browsing_time_min" type="number" value="19" /></div>
          <div class="field"><label for="items_in_cart">items_in_cart</label><input id="items_in_cart" type="number" value="3" /></div>
          <div class="field"><label for="wishlist_items">wishlist_items</label><input id="wishlist_items" type="number" value="7" /></div>
          <div class="field"><label for="clicked_ads">clicked_ads</label><input id="clicked_ads" type="number" value="2" /></div>

          <div class="field"><label for="product_category">product_category</label><select id="product_category"><option>Electronics</option><option>Clothing</option><option>Home</option><option>Sports</option></select></div>
          <div class="field"><label for="user_loyalty_tier">user_loyalty_tier</label><select id="user_loyalty_tier"><option>Silver</option><option>Gold</option><option>Platinum</option></select></div>
          <div class="field"><label for="user_gender">user_gender</label><select id="user_gender"><option>M</option><option>F</option><option>Other</option></select></div>
          <div class="field"><label for="season">season</label><select id="season"><option>Summer</option><option>Spring</option><option>Autumn</option><option>Winter</option></select></div>
          <div class="field"><label for="purchase_history_category">purchase_history_category</label><select id="purchase_history_category"><option>Electronics</option><option>Clothing</option><option>Home &amp; Kitchen</option><option>Sports</option><option>Toys</option></select></div>
          <div class="field"><label for="previous_category">previous_category</label><select id="previous_category"><option>Electronics</option><option>Clothing</option><option>Home &amp; Kitchen</option><option>Sports</option><option>Toys</option></select></div>
        </div>

        <div class="checks">
          <label class="check"><input type="checkbox" value="fraud" checked />fraud</label>
          <label class="check"><input type="checkbox" value="churn" checked />churn</label>
          <label class="check"><input type="checkbox" value="pricing" checked />pricing</label>
          <label class="check"><input type="checkbox" value="recommendation" checked />recommendation</label>
        </div>

        <div class="actions">
          <button class="primary" id="runBtn">Run Engine</button>
          <button class="secondary" id="resetBtn">Reset Node Colors</button>
        </div>
        <div id="waveStatus">Idle</div>
      </section>

      <section class="panel">
        <h2>Dependency Graph (vis-network)</h2>
        <div id="network"></div>
      </section>
    </div>

    <div class="bottom">
      <section class="panel">
        <h2>Execution Output</h2>
        <div id="metrics"></div>
        <h2 style="margin-top:10px;">Model Results</h2>
        <pre id="results">Run Engine to see predictions.</pre>
        <h2 style="margin-top:10px;">Wave Details</h2>
        <pre id="waveDetails">-</pre>
        <h2 style="margin-top:10px;">Partial Failures</h2>
        <pre id="failures">None</pre>
      </section>
      <section class="panel">
        <h2>Timing Chart</h2>
        <canvas id="timingChart" height="240"></canvas>
      </section>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/vis-network.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script>
    const apiBase = window.location.protocol === "file:" ? "http://127.0.0.1:8000" : "";
    const waveStatusEl = document.getElementById("waveStatus");
    const resultsEl = document.getElementById("results");
    const waveDetailsEl = document.getElementById("waveDetails");
    const failuresEl = document.getElementById("failures");
    const metricsEl = document.getElementById("metrics");

    const COLOR_RAW = "#f2b263";
    const COLOR_DERIVED = "#69a8dc";
    const COLOR_RUNNING = "#f1d45c";
    const COLOR_DONE = "#4fc180";
    const COLOR_FAILED = "#e36b6b";

    const nodeDataset = new vis.DataSet([]);
    const edgeDataset = new vis.DataSet([]);
    let network = null;
    let timingChart = null;

    function selectedModels() {
      return Array.from(document.querySelectorAll(".checks input:checked")).map((x) => x.value);
    }

    function readInputData() {
      const tx = document.getElementById("transaction_history").value
        .split(",")
        .map((x) => Number(x.trim()))
        .filter((x) => !Number.isNaN(x));

      return {
        user_age: Number(document.getElementById("user_age").value),
        product_price: Number(document.getElementById("product_price").value),
        transaction_history: tx,
        device_fingerprint: document.getElementById("device_fingerprint").value,

        distance_from_home: Number(document.getElementById("distance_from_home").value),
        previous_fraud_attempts: Number(document.getElementById("previous_fraud_attempts").value),
        is_night_transaction: Number(document.getElementById("is_night_transaction").value),
        card_present: Number(document.getElementById("card_present").value),
        international_transaction: Number(document.getElementById("international_transaction").value),

        tenure_months: Number(document.getElementById("tenure_months").value),
        last_purchase_days: Number(document.getElementById("last_purchase_days").value),
        support_tickets: Number(document.getElementById("support_tickets").value),
        complaints: Number(document.getElementById("complaints").value),
        discount_used: Number(document.getElementById("discount_used").value),
        email_open_rate: Number(document.getElementById("email_open_rate").value),
        app_visits_per_week: Number(document.getElementById("app_visits_per_week").value),
        payment_delays: Number(document.getElementById("payment_delays").value),

        competitor_price: Number(document.getElementById("competitor_price").value),
        inventory_level: Number(document.getElementById("inventory_level").value),
        customer_rating: Number(document.getElementById("customer_rating").value),
        seasonal_factor: Number(document.getElementById("seasonal_factor").value),

        avg_rating_given: Number(document.getElementById("avg_rating_given").value),
        browsing_time_min: Number(document.getElementById("browsing_time_min").value),
        items_in_cart: Number(document.getElementById("items_in_cart").value),
        wishlist_items: Number(document.getElementById("wishlist_items").value),
        clicked_ads: Number(document.getElementById("clicked_ads").value),

        product_category: document.getElementById("product_category").value,
        user_loyalty_tier: document.getElementById("user_loyalty_tier").value,
        user_gender: document.getElementById("user_gender").value,
        season: document.getElementById("season").value,
        purchase_history_category: document.getElementById("purchase_history_category").value,
        previous_category: document.getElementById("previous_category").value,
      };
    }

    async function callApi(path, method = "GET", payload = null) {
      const opts = { method, headers: { "Content-Type": "application/json" } };
      if (payload) opts.body = JSON.stringify(payload);
      const res = await fetch(`${apiBase}${path}`, opts);
      if (!res.ok) {
        const text = await res.text();
        throw new Error(text || `HTTP ${res.status}`);
      }
      return res.json();
    }

    function baseColorForNode(node) {
      return node.kind === "raw_input" ? COLOR_RAW : COLOR_DERIVED;
    }

    function resetNodeColors() {
      nodeDataset.forEach((node) => {
        nodeDataset.update({ id: node.id, color: { background: baseColorForNode(node), border: "#59606b" } });
      });
      waveStatusEl.textContent = "Idle";
    }

    async function loadGraph() {
      const graph = await callApi("/api/graph");
      nodeDataset.clear();
      edgeDataset.clear();

      nodeDataset.add(
        graph.nodes.map((n) => ({
          id: n.id,
          label: n.id,
          shape: "box",
          margin: 8,
          widthConstraint: { minimum: 120 },
          font: { face: "IBM Plex Mono", size: 12, bold: { size: 12 } },
          color: { background: n.kind === "raw_input" ? COLOR_RAW : COLOR_DERIVED, border: "#59606b" },
          kind: n.kind,
        }))
      );

      edgeDataset.add(
        graph.edges.map((e, idx) => ({ id: `${e.source}->${e.target}-${idx}`, from: e.source, to: e.target, arrows: "to" }))
      );

      if (!network) {
        network = new vis.Network(
          document.getElementById("network"),
          { nodes: nodeDataset, edges: edgeDataset },
          {
            autoResize: true,
            physics: { enabled: false },
            layout: {
              hierarchical: {
                enabled: true,
                direction: "LR",
                sortMethod: "directed",
                levelSeparation: 130,
                nodeSpacing: 120,
                treeSpacing: 160,
                blockShifting: true,
                edgeMinimization: true,
                parentCentralization: true,
              },
            },
            edges: {
              smooth: false,
              width: 1.4,
              color: { color: "#6e6c73" },
            },
            interaction: {
              hover: true,
              navigationButtons: true,
              keyboard: true,
              zoomView: true,
              dragView: true,
            },
          }
        );
      }

      if (network) {
        network.fit({ animation: true });
      }

      resetNodeColors();
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    async function animateWaves(waves, partialFailures) {
      for (let i = 0; i < waves.length; i += 1) {
        const wave = waves[i];
        waveStatusEl.textContent = `Executing Wave ${i}...`;

        wave.forEach((feature) => {
          if (nodeDataset.get(feature)) {
            nodeDataset.update({ id: feature, color: { background: COLOR_RUNNING, border: "#4a4a4a" } });
          }
        });

        await sleep(550);

        wave.forEach((feature) => {
          if (!nodeDataset.get(feature)) return;
          const failed = Object.prototype.hasOwnProperty.call(partialFailures, feature);
          nodeDataset.update({
            id: feature,
            color: { background: failed ? COLOR_FAILED : COLOR_DONE, border: "#4a4a4a" },
          });
        });

        await sleep(320);
      }
      waveStatusEl.textContent = `Completed ${waves.length} waves.`;
    }

    function renderChart(engineTimeMs, sequentialTimeMs) {
      const ctx = document.getElementById("timingChart");
      if (timingChart) timingChart.destroy();

      timingChart = new Chart(ctx, {
        type: "bar",
        data: {
          labels: ["Engine", "Sequential"],
          datasets: [{
            data: [engineTimeMs, sequentialTimeMs],
            backgroundColor: ["#69a8dc", "#dd623c"],
            borderRadius: 8,
          }],
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, title: { display: true, text: "ms" } },
          },
        },
      });
    }

    function renderResponse(data) {
      resultsEl.textContent = JSON.stringify(data.results, null, 2);
      waveDetailsEl.textContent = data.execution_plan.waves
        .map((wave, idx) => `Wave ${idx}: ${wave.join(", ")}`)
        .join("\n\n");
      failuresEl.textContent = Object.keys(data.partial_failures || {}).length
        ? JSON.stringify(data.partial_failures, null, 2)
        : "None";

      const m = data.metrics;
      metricsEl.innerHTML = `
        <div class="metric">engine_time_ms: ${m.engine_time_ms}</div>
        <div class="metric">sequential_time_ms: ${m.sequential_time_ms}</div>
        <div class="metric">speedup_factor: ${m.speedup_factor}</div>
        <div class="metric">features_reused: ${data.execution_plan.features_reused}</div>
        <div class="metric">features_saved_from_recompute: ${m.features_saved_from_recompute}</div>
        <div class="metric">cache_hits: ${data.observability.cache_hits}</div>
        <div class="metric">cache_misses: ${data.observability.cache_misses}</div>
        <div class="metric">fastest_feature: ${data.observability.fastest_feature || "-"}</div>
        <div class="metric">slowest_feature: ${data.observability.slowest_feature || "-"}</div>
      `;

      renderChart(m.engine_time_ms, m.sequential_time_ms);
    }

    document.getElementById("runBtn").addEventListener("click", async () => {
      try {
        waveStatusEl.textContent = "Calling /api/execute...";
        resetNodeColors();
        const payload = { models: selectedModels(), input_data: readInputData() };
        const data = await callApi("/api/execute", "POST", payload);
        renderResponse(data);
        await animateWaves(data.execution_plan.waves, data.partial_failures || {});
      } catch (err) {
        waveStatusEl.textContent = `Error: ${err.message}`;
      }
    });

    document.getElementById("resetBtn").addEventListener("click", resetNodeColors);

    loadGraph().catch((err) => {
      waveStatusEl.textContent = `Graph load failed: ${err.message}`;
    });
  </script>
</body>
</html>
